name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            turbo-${{ runner.os }}-

  playwright-e2e:
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: barokah
          POSTGRES_PASSWORD: barokah
          POSTGRES_DB: barokah_pos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U barokah -d barokah_pos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://barokah:barokah@localhost:5432/barokah_pos
      REDIS_DISABLED: 'true'
      JWT_SECRET: ci-test-secret-change-me
      JWT_REFRESH_SECRET: ci-test-refresh-secret-change-me
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: development
      API_PORT: '3000'
      WEB_PORT: '3001'
      NEXT_PUBLIC_API_URL: http://localhost:3000
      MIDTRANS_WEBHOOK_SKIP_VERIFY: 'true'
      STOREFRONT_BASE_URL: http://localhost:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Migrate and seed database
        run: |
          npm run db:migrate:deploy
          npm run db:seed

      - name: Build API and Web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
        run: |
          npm run build --workspace=@barokah/api
          npm run build --workspace=@barokah/web

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start API and Web servers
        run: |
          npm run start --workspace=@barokah/api &
          mkdir -p apps/web/.next/standalone/apps/web/.next
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public
          cd apps/web/.next/standalone && HOSTNAME=0.0.0.0 PORT=3001 node apps/web/server.js &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/v1/health >/dev/null && curl -sf http://localhost:3001/login >/dev/null; then
              echo "Servers ready"
              exit 0
            fi
            sleep 2
          done
          echo "Servers failed to start"
          exit 1

      - name: Run Playwright smoke tests
        run: PLAYWRIGHT_SKIP_WEBSERVER=1 PLAYWRIGHT_BASE_URL=http://localhost:3001 PLAYWRIGHT_API_URL=http://localhost:3000/api/v1 npm run test:e2e
