# Full stack — postgres, redis, api, web
# Usage: npm run docker:full:up
# Infra only (postgres + redis): npm run docker:up

services:
  postgres:
    image: postgres:16-alpine
    container_name: barokah-postgres
    environment:
      POSTGRES_USER: barokah
      POSTGRES_PASSWORD: barokah
      POSTGRES_DB: barokah_pos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - barokah
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barokah -d barokah_pos"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: barokah-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - barokah
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  db-migrate:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: migrator
    container_name: barokah-db-migrate
    environment:
      DATABASE_URL: postgresql://barokah:barokah@postgres:5432/barokah_pos
      SEED_DATABASE: ${SEED_DATABASE:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - barokah
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: barokah-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://barokah:barokah@postgres:5432/barokah_pos
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-docker-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-docker-refresh-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      API_PORT: "3000"
      API_PORT_FALLBACK: "false"
      NODE_ENV: production
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - barokah
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/api/v1/health > /dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: barokah-web
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: production
      PORT: "3001"
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    networks:
      - barokah
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3001/ > /dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  barokah:
    name: barokah
    driver: bridge

volumes:
  postgres_data:
  redis_data:
